      }
      #header {
        background: #2c3e50;
        color: white;
        padding: 20px;

      }

        font-size: 24px;
        margin-bottom: 5px;
      }
      #header p {
        font-size: 14px;
        opacity: 0.9;
      }
      #map {
        position: absolute;
        top: 100px;
        bottom: 0;
        width: 100%;
        z-index: 1;
      }
      #stats {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: white;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        z-index: 1000;
        font-size: 14px;
        min-width: 180px;
      }
      #stats div {
        margin-bottom: 8px;
      }
      #stats div:last-child {
        margin-bottom: 0;
      }
      .stat-label {
        font-weight: bold;
        color: #2c3e50;
      }
      .stat-value {
        color: #3498db;
        font-weight: 500;
      }
      .legend-item {
        cursor: pointer;
        padding: 4px 0;
        transition: opacity 0.2s;
        user-select: none;
      }
      .legend-item:hover {
        opacity: 0.7;
      }
      .legend-item.inactive {
        opacity: 0.4;
      }
      .legend-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .leaflet-popup-content {
        font-size: 13px;
      }
      .popup-title {
        font-weight: bold;
        margin-bottom: 5px;
        color: #2c3e50;
      }
      .popup-detail {
        font-size: 12px;
        color: #555;
      }
    </style>

      const countrySet = new Set();
      const markersByType = {
        standard: [],
        hub: [],
        isolated: [],
        regional: [],
      };
      const visibility = {
        standard: true,
        hub: true,
        isolated: true,
        regional: true,
      };

      const greenIcon = new L.Icon({
        iconUrl: 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41],
      });

      const orangeIcon = new L.Icon({
        iconUrl: 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-orange.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41],
      });

      const greyIcon = new L.Icon({
        iconUrl: 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-grey.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41],
      });

      airports.forEach((airport) => {
        let type = 'standard';
        const markerOptions = { title: airport.iata };
        if (airport.isolated) {
          markerOptions.icon = orangeIcon;
          type = 'isolated';
        } else if (airport.distanceHub) {
          markerOptions.icon = greenIcon;
          type = 'hub';
        } else if (airport.regional) {
          markerOptions.icon = greyIcon;
          type = 'regional';
        }
        const marker = L.marker([airport.lat, airport.lng], markerOptions);

        const popupContent =
          '<div class="popup-title">' +
          airport.iata +
          ' - ' +
          airport.name +
          '</div>' +
          '<div class="popup-detail"><strong>City:</strong> ' +
          airport.city +
          '</div>' +
          '<div class="popup-detail"><strong>Country:</strong> ' +
          airport.country +
          '</div>' +
          '<div class="popup-detail"><strong>ICAO:</strong> ' +
          airport.icao +
          '</div>' +
          '<div class="popup-detail"><strong>Coordinates:</strong> ' +
          airport.lat.toFixed(4) +
          ', ' +
          airport.lng.toFixed(4) +
          '</div>';

        marker.bindPopup(popupContent);
        marker.addTo(map);

        markersByType[type].push(marker);
        countrySet.add(airport.country);
      });

      document.getElementById('airport-count').textContent = airports.length;
      document.getElementById('country-count').textContent = countrySet.size;

      document.querySelectorAll('.legend-item').forEach((item) => {
        item.addEventListener('click', function () {
          const type = this.getAttribute('data-type');
          visibility[type] = !visibility[type];
          this.classList.toggle('inactive');

          markersByType[type].forEach((marker) => {
            if (visibility[type]) {
              marker.addTo(map);
            } else {
              map.removeLayer(marker);
            }
          });
        });
      });

      if (airports.length > 0) {
        const bounds = L.latLngBounds(airports.map((a) => [a.lat, a.lng]));
        map.fitBounds(bounds, { padding: [50, 50] });
      }
