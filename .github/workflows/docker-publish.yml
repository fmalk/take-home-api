name: Docker Publish

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to check out and publish (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        shell: bash
        run: |
          IMAGE="fernandopj/take-home-api"
          VERSION="${TAG_NAME#v}"
          TAGS="$IMAGE:$VERSION"$'\n'"$IMAGE:latest"
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          TAG_NAME: ${{ inputs.tag_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
